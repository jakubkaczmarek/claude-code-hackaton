<div class="filter-panel">
  <div class="filter-panel__row">

    <div class="filter-panel__field">
      <label>Search</label>
      <input type="text" class="filter-panel__input"
        [ngModel]="filters.keyword"
        (ngModelChange)="updateFilter('keyword', $event)"
        placeholder="Keyword..." />
    </div>

    <div class="filter-panel__field">
      <label>Type</label>
      <select class="filter-panel__select"
        [ngModel]="filters.type"
        (ngModelChange)="updateFilter('type', $event)">
        <option value="">Any</option>
        <option value="house">House</option>
        <option value="apartment">Apartment</option>
        <option value="condo">Condo</option>
        <option value="commercial">Commercial</option>
        <option value="land">Land</option>
      </select>
    </div>

    <div class="filter-panel__field">
      <label>Status</label>
      <select class="filter-panel__select"
        [ngModel]="filters.status"
        (ngModelChange)="updateFilter('status', $event)">
        <option value="">Any</option>
        <option value="for-sale">For Sale</option>
        <option value="for-rent">For Rent</option>
        <option value="sold">Sold</option>
        <option value="under-offer">Under Offer</option>
      </select>
    </div>

    <div class="filter-panel__field">
      <label>Location</label>
      <select class="filter-panel__select"
        [ngModel]="filters.location"
        (ngModelChange)="updateFilter('location', $event)">
        <option value="">Any</option>
        @for (loc of locations(); track loc.name) {
          <option [value]="loc.name">{{ loc.name }}</option>
        }
      </select>
    </div>

    <div class="filter-panel__field">
      <label>Min Beds</label>
      <select class="filter-panel__select"
        [ngModel]="filters.bedroomsMin"
        (ngModelChange)="updateFilter('bedroomsMin', $event)">
        @for (opt of bedroomOptions; track opt.value) {
          <option [value]="opt.value">{{ opt.label }}</option>
        }
      </select>
    </div>

  </div>

  <div class="filter-panel__row">

    <div class="filter-panel__field">
      <label>Min Price ($)</label>
      <input type="number" class="filter-panel__input"
        [ngModel]="filters.priceMin"
        (ngModelChange)="updateFilter('priceMin', $event)"
        placeholder="0" />
    </div>

    <div class="filter-panel__field">
      <label>Max Price ($)</label>
      <input type="number" class="filter-panel__input"
        [ngModel]="filters.priceMax"
        (ngModelChange)="updateFilter('priceMax', $event)"
        placeholder="Any" />
    </div>

    <div class="filter-panel__field filter-panel__field--clear">
      <button class="filter-panel__clear-btn" (click)="clearAll()">Clear Filters</button>
    </div>

  </div>
</div>
