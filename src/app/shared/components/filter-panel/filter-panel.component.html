<div class="filter-panel">
  <div class="filter-panel__row">

    <mat-form-field appearance="outline" class="filter-panel__field filter-panel__field--wide">
      <mat-label>Search</mat-label>
      <mat-icon matPrefix>search</mat-icon>
      <input matInput
             [ngModel]="filters.keyword"
             (ngModelChange)="updateFilter('keyword', $event)"
             placeholder="Keyword, suburb, type..." />
    </mat-form-field>

    <mat-form-field appearance="outline" class="filter-panel__field">
      <mat-label>Type</mat-label>
      <mat-select [ngModel]="filters.type" (ngModelChange)="updateFilter('type', $event)">
        <mat-option value="">Any</mat-option>
        <mat-option value="house">House</mat-option>
        <mat-option value="apartment">Apartment</mat-option>
        <mat-option value="condo">Condo</mat-option>
        <mat-option value="commercial">Commercial</mat-option>
        <mat-option value="land">Land</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="filter-panel__field">
      <mat-label>Status</mat-label>
      <mat-select [ngModel]="filters.status" (ngModelChange)="updateFilter('status', $event)">
        <mat-option value="">Any</mat-option>
        <mat-option value="for-sale">For Sale</mat-option>
        <mat-option value="for-rent">For Rent</mat-option>
        <mat-option value="sold">Sold</mat-option>
        <mat-option value="under-offer">Under Offer</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="filter-panel__field">
      <mat-label>Location</mat-label>
      <mat-select [ngModel]="filters.location" (ngModelChange)="updateFilter('location', $event)">
        <mat-option value="">Any</mat-option>
        @for (loc of locations(); track loc.name) {
          <mat-option [value]="loc.name">{{ loc.name }}</mat-option>
        }
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="filter-panel__field filter-panel__field--narrow">
      <mat-label>Min Beds</mat-label>
      <mat-select [ngModel]="filters.bedroomsMin" (ngModelChange)="updateFilter('bedroomsMin', $event)">
        @for (opt of bedroomOptions; track opt.value) {
          <mat-option [value]="opt.value">{{ opt.label }}</mat-option>
        }
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="filter-panel__field filter-panel__field--narrow">
      <mat-label>Min Price</mat-label>
      <span matTextPrefix>$&nbsp;</span>
      <input matInput type="number"
             [ngModel]="filters.priceMin"
             (ngModelChange)="updateFilter('priceMin', $event)"
             placeholder="0" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="filter-panel__field filter-panel__field--narrow">
      <mat-label>Max Price</mat-label>
      <span matTextPrefix>$&nbsp;</span>
      <input matInput type="number"
             [ngModel]="filters.priceMax"
             (ngModelChange)="updateFilter('priceMax', $event)"
             placeholder="Any" />
    </mat-form-field>

    <button mat-stroked-button class="filter-panel__clear" (click)="clearAll()">
      <mat-icon>clear</mat-icon> Clear
    </button>

  </div>
</div>
