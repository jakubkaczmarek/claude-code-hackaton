<mat-toolbar color="primary" class="app-toolbar">
  <a mat-button routerLink="/properties" class="app-toolbar__brand">
    <mat-icon>home</mat-icon>
    <span>PropBoard</span>
  </a>
  <span class="spacer"></span>
  <a mat-button routerLink="/properties" routerLinkActive="active-link">Properties</a>
  <a mat-button routerLink="/favorites" routerLinkActive="active-link"
     [matBadge]="favCount() > 0 ? favCount() : null" matBadgeColor="accent" matBadgeSize="small">
    <mat-icon>favorite_border</mat-icon>
    Favorites
  </a>
</mat-toolbar>

<div class="main-content">
  <router-outlet />
</div>
